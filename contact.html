<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bean & Brew | Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Bean & Brew</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
                <button id="darkModeToggle" class="btn btn-outline-dark btn-sm">Toggle Dark Mode</button>
            </div>
        </div>
    </nav>

    <main class="container my-5" id="main-content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h1 class="text-center mb-4 fw-bold">Get In Touch</h1>
                <form id="contactForm" class="p-4 bg-light rounded shadow-sm border">
                    <div class="mb-3">
                        <label for="userEmail" class="form-label fw-semibold">Email address</label>
                        <input type="email" class="form-control" id="userEmail" placeholder="name@example.com">
                    </div>
                    <div class="mb-3">
                        <label for="userMessage" class="form-label fw-semibold">Your Message</label>
                        <textarea class="form-control" id="userMessage" rows="4" placeholder="What are you getting in touch about?"></textarea>
                    </div>
                    <button type="submit" class="btn btn-outline-dark w-100 fw-bold">Send Message</button>
                    <div id="formFeedback" class="mt-3 text-center fw-bold"></div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-4 mt-auto border-top">
        <div class="container">
            <p class="text-center text-muted small mt-4">Prefer direct emails? Reach out at contact@beanbrew.com</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
